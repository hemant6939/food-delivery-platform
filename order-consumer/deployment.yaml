apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-consumer
  namespace: food-delivery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-consumer
  template:
    metadata:
      labels:
        app: order-consumer
    spec:
      containers:
        - name: order-consumer
          image: order-consumer:1.0
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKER
              value: "kafka-kafka-bootstrap:9092"
            - name: KAFKA_TOPIC
              value: "fooddelivery.public.orders"
            - name: ES_URL
              value: "http://elasticsearch:9200"
            - name: GROUP_ID
              value: "order-es-indexer"

