<!DOCTYPE html>
<html>
<head>
    <title>Food Delivery Platform</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        input, button { padding: 10px; margin: 5px 0; font-size: 16px; }
        input { width: 100%; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; width: 100%; }
        button:hover { background: #45a049; }
        .section { margin: 30px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .result { padding: 10px; margin: 5px 0; background: #f9f9f9; border-radius: 4px; }
        #message { color: green; margin: 10px 0; }
        #error { color: red; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Food Delivery Platform</h1>

    <div class="section">
        <h2>Place Order</h2>
        <input type="text" id="customerName" placeholder="Customer Name">
        <input type="text" id="restaurantName" placeholder="Restaurant Name">
        <input type="text" id="items" placeholder="Items (e.g. pizza,coke)">
        <input type="number" id="totalAmount" placeholder="Total Amount">
        <button onclick="placeOrder()">Place Order</button>
        <div id="message"></div>
    </div>

    <div class="section">
        <h2>Search Orders</h2>
        <input type="text" id="searchQuery" placeholder="Search by name, restaurant, or item...">
        <button onclick="searchOrders()">Search</button>
        <div id="results"></div>
    </div>

    <script>
        const ORDER_API = "http://food.local/api/orders";
        const SEARCH_API = "http://food.local/api/search";
        async function placeOrder() {
            const order = {
                customer_name: document.getElementById("customerName").value,
                restaurant_name: document.getElementById("restaurantName").value,
                items: document.getElementById("items").value,
                total_amount: parseFloat(document.getElementById("totalAmount").value)
            };

            try {
                const res = await fetch(ORDER_API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(order)
                });
                const data = await res.json();
                document.getElementById("message").innerText = "Order placed! ID: " + data.id;
            } catch (err) {
                document.getElementById("message").innerText = "Error: " + err.message;
            }
        }

        async function searchOrders() {
            const query = document.getElementById("searchQuery").value;
            try {
                const res = await fetch(SEARCH_API + "?q=" + query);
                const data = await res.json();
                const hits = data.hits.hits;
                let html = "";
                hits.forEach(hit => {
                    const o = hit._source;
                    html += '<div class="result">';
                    html += '<strong>' + o.customer_name + '</strong> ordered from <strong>' + o.restaurant_name + '</strong><br>';
                    html += 'Items: ' + o.items + ' | Status: ' + o.status;
                    html += '</div>';
                });
                if (hits.length === 0) html = "No results found.";
                document.getElementById("results").innerHTML = html;
            } catch (err) {
                document.getElementById("results").innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
