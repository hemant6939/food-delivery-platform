apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: food-delivery
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/hemant6939/food-delivery-platform
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: order-service
  namespace: food-delivery
spec:
  interval: 1m
  chart:
    spec:
      chart: ./charts/order-service
      sourceRef:
        kind: GitRepository
        name: food-delivery
        namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: order-consumer
  namespace: food-delivery
spec:
  interval: 1m
  chart:
    spec:
      chart: ./charts/order-consumer
      sourceRef:
        kind: GitRepository
        name: food-delivery
        namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: search-service
  namespace: food-delivery
spec:
  interval: 1m
  chart:
    spec:
      chart: ./charts/search-service
      sourceRef:
        kind: GitRepository
        name: food-delivery
        namespace: flux-system
