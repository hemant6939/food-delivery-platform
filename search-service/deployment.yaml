apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: food-delivery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: search-service:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: ES_URL
              value: "http://elasticsearch:9200"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: food-delivery
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: search-service
